<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHBK FUN - Quiz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <h1 class="title-glow">CHBK FUN</h1>
    
    <!-- Profil et Bouton Connexion -->
    <div id="auth-section" style="text-align: center; margin-top: 1rem;">
        <button id="login-btn" class="orange-btn">Connexion avec Google</button>
        <div id="user-info"></div>
        <button id="btn-my-stats" class="orange-btn" style="display: none; margin: 10px auto; padding: 8px 15px; font-size: 1rem;">📊 Mes Stats</button>
    </div>

    <!-- Menu Principal & Leaderboard -->
    <div id="main-menu" style="display: none; text-align: center; margin-top: 1rem; width: 100%; max-width: 800px;">
        <div style="display: flex; justify-content: space-around; flex-wrap: wrap; align-items: flex-start;">
            
            <!-- Boutons de Jeu -->
            <div style="flex: 1; min-width: 300px; margin: 10px;">
                <button id="btn-solo" class="orange-btn game-btn">Lancer Mode Solo (10 Q)</button>
                <button id="btn-vs-menu" class="orange-btn game-btn">Mode VS (Multijoueur)</button>
            </div>

            <!-- Leaderboard -->
            <div id="leaderboard" style="flex: 1; min-width: 300px; margin: 10px; background: #222; border: 2px solid var(--text-orange); border-radius: 8px; padding: 15px;">
                <h2 style="margin-top: 0;">🏆 Classement</h2>
                <ul id="leaderboard-list" style="list-style: none; padding: 0; text-align: left; margin: 0;">
                    <li>Chargement du classement...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Lobby Multijoueur : Les 3 Salles -->
    <div id="vs-lobby" style="display: none; text-align: center; margin-top: 2rem;">
        <h2>Salles Multijoueur</h2>
        <p style="color: #ccc;">Le premier à rejoindre devient l'hôte de la partie.</p>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin: 30px 0;">
            <button class="orange-btn room-btn" data-room="1">Salle 1</button>
            <button class="orange-btn room-btn" data-room="2">Salle 2</button>
            <button class="orange-btn room-btn" data-room="3">Salle 3</button>
        </div>
        
        <!-- Salle d'attente de l'hôte -->
        <div id="waiting-room" style="display: none; background: #222; padding: 20px; border-radius: 8px; border: 1px solid var(--text-orange); margin: 20px auto; max-width: 400px;">
            <h3>Vous êtes l'Hôte !</h3>
            <p>Joueurs connectés : <span id="players-count" style="font-weight: bold; color: var(--text-orange);">0</span></p>
            <ul id="players-list" style="list-style: none; padding: 0; color: #ccc;"></ul>
            <button id="btn-start-vs" class="orange-btn" style="margin-top: 15px;">Lancer la partie</button>
        </div>

        <button id="btn-back-menu" class="orange-btn" style="background: #555; color: white;">Retour au menu</button>
    </div>

    <!-- Zone de Jeu -->
    <div id="game-zone" style="display: none; text-align: center; margin-top: 2rem; width: 90%; max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="question-counter" style="font-size: 1.2rem; font-weight: bold;">Question 1/10</span>
            <span id="timer" style="font-size: 2rem; font-weight: bold; color: #ff3333;">14</span>
        </div>
        
        <h3 id="question-theme" style="color: #ccc; text-transform: uppercase; font-size: 0.9rem;">Thème</h3>
        <p id="question-text" style="font-size: 1.5rem; margin: 20px 0; min-height: 80px;"></p>
        
        <input type="text" id="answer-input" placeholder="Écris ta réponse ici..." autocomplete="off">
        <button id="submit-answer" class="orange-btn">Valider</button>
        
        <p id="feedback-msg" style="font-size: 1.2rem; font-weight: bold; height: 30px; margin-top: 15px;"></p>
        <p id="attempts-left" style="font-size: 0.9rem; color: #aaa; display: none;">Essais restants : 3</p>
    </div>

    <!-- Fenêtre Pop-up des Statistiques -->
    <div id="stats-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: var(--bg-dark); border: 2px solid var(--text-orange); padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; position: relative;">
            <button id="close-stats" style="position: absolute; top: 10px; right: 15px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <div id="stats-content"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
