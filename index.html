<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHBK FUN - Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title-glow">CHBK FUN</h1>
    
    <!-- Zone de connexion et profil -->
    <div id="auth-section" style="text-align: center; margin-top: 1rem;">
        <button id="login-btn" class="orange-btn">Connexion avec Google</button>
        <div id="user-info"></div>
    </div>

    <!-- Menu Principal (Caché tant qu'on n'est pas connecté) -->
    <div id="main-menu" style="display: none; text-align: center; margin-top: 2rem;">
        <button id="btn-solo" class="orange-btn game-btn">Lancer Mode Solo (10 Q)</button>
        <button id="btn-vs" class="orange-btn game-btn" style="opacity: 0.5; cursor: not-allowed;">Mode VS (Bientôt)</button>
    </div>

    <!-- Zone de Jeu (Cachée par défaut) -->
    <div id="game-zone" style="display: none; text-align: center; margin-top: 2rem; width: 90%; max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="question-counter" style="font-size: 1.2rem; font-weight: bold;">Question 1/10</span>
            <span id="timer" style="font-size: 2rem; font-weight: bold; color: #ff3333;">14</span>
        </div>
        
        <h3 id="question-theme" style="color: #ccc; text-transform: uppercase; font-size: 0.9rem;">Thème</h3>
        <p id="question-text" style="font-size: 1.5rem; margin: 20px 0; min-height: 80px;">Chargement...</p>
        <img id="question-img" src="" alt="Image de la question" style="display: none; max-width: 100%; max-height: 200px; border-radius: 8px; margin: 0 auto 20px auto;">
        
        <input type="text" id="answer-input" placeholder="Écris ta réponse ici..." autocomplete="off">
        <button id="submit-answer" class="orange-btn">Valider</button>
        
        <p id="feedback-msg" style="font-size: 1.2rem; font-weight: bold; height: 30px; margin-top: 15px;"></p>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
