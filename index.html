<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHBK FUN - Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title-glow">CHBK FUN</h1>
    
    <div id="auth-section" style="text-align: center; margin-top: 2rem;">
        <button id="login-btn" style="padding: 10px 20px; font-size: 1.2rem; cursor: pointer; background: var(--text-orange); color: var(--bg-dark); border: none; border-radius: 5px; font-weight: bold;">
            Connexion avec Google
        </button>
        <div id="user-info" style="margin-top: 20px;"></div>
    </div>
<!-- ZONE ADMIN TEMPORAIRE (À supprimer plus tard) -->
    <div id="admin-panel" style="margin-top: 50px; border: 2px dashed #FF8C00; padding: 20px; border-radius: 10px; width: 80%; max-width: 600px; text-align: center;">
        <h3 style="margin-top: 0;">🛠️ Zone d'importation des questions</h3>
        <textarea id="json-input" style="width: 100%; height: 100px; margin-bottom: 10px; background: #222; color: white; border: 1px solid #555;" placeholder="Colle tout le contenu de ton bloc-notes ici..."></textarea>
        <button id="import-btn" style="padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold;">
            Injecter dans la BDD !
        </button>
        <p id="import-status" style="margin-top: 10px; font-weight: bold;"></p>
    </div>
    <!-- type="module" est indispensable pour les imports Firebase -->
    <script type="module" src="app.js"></script>
</body>
</html>
